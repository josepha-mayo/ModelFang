<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 300px; padding: 15px; font-family: sans-serif; background: #1e1e1e; color: #fff; }
    h2 { margin-top: 0; font-size: 16px; border-bottom: 1px solid #333; padding-bottom: 10px; }
    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover { background: #4338ca; }
    .status { margin-top: 10px; font-size: 12px; color: #aaa; text-align: center; }
    .success { color: #4ade80; }
    .error { color: #f87171; }
  </style>
</head>
<body>
  <h2>Unfetter Sync</h2>
  <div id="status" class="status">Click below to sync active sessions.</div>
  <button id="syncBtn">Sync All Sessions</button>
  <script src="popup.js"></script>
</body>
</html>
